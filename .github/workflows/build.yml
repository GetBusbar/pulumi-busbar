name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  PROVIDER: busbar
  GO_VERSION: "1.26"
  NODE_VERSION: "20.x"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pulumi-busbar
        uses: actions/checkout@v4
        with:
          path: pulumi-busbar

      # The bridge builds against a LOCAL copy of the upstream Terraform
      # provider via a go.mod `replace` directive. CI must lay the two repos out
      # as sibling directories so the relative replace paths resolve:
      #
      #   <workspace>/pulumi-busbar
      #   <workspace>/terraform-provider-busbar
      #
      # (In this local scaffold the upstream lives at scratchpad/terraform-provider-busbar;
      #  adjust the `repository`/`path` below to the real upstream when publishing.)
      - name: Checkout terraform-provider-busbar
        uses: actions/checkout@v4
        with:
          repository: GetBusbar/terraform-provider-busbar
          path: terraform-provider-busbar

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            pulumi-busbar/provider/go.sum
            pulumi-busbar/sdk/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install pulumictl
        uses: jaxxstorm/action-install-gh-release@v1.12.0
        with:
          repo: pulumi/pulumictl

      - name: Build provider + schema
        working-directory: pulumi-busbar
        run: make provider

      - name: Generate SDKs
        working-directory: pulumi-busbar
        run: make build_sdks

      - name: Build TypeScript SDK
        working-directory: pulumi-busbar/sdk/nodejs
        run: |
          sed -i "s/\${VERSION}/0.0.1/" package.json
          npm install
          npx tsc

      - name: Build Python SDK
        working-directory: pulumi-busbar/sdk/python
        run: |
          python -m pip install build
          python -m build --sdist

      - name: Build Go SDK
        working-directory: pulumi-busbar/sdk
        run: go build ./...

      - name: Drift check (schema + SDKs are up to date)
        working-directory: pulumi-busbar
        run: git diff --exit-code
