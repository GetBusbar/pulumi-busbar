name: build

# Minimal CI using only first-party actions (actions/*). Proves the bridged
# provider + Go SDK compile against the published terraform-provider-busbar
# module. Full multi-language SDK regeneration (needs the Pulumi CLI + pulumictl)
# runs from the release workflow, not here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build provider (bridges against published terraform-provider-busbar)
        working-directory: provider
        run: go build ./...

      - name: Vet provider
        working-directory: provider
        run: go vet ./...

      - name: Build Go SDK
        working-directory: sdk
        run: go build ./...
